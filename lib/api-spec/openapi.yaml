openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: RecruitStream staffing & project management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: dashboard
  - name: candidates
  - name: jobs
  - name: companies
  - name: contacts
  - name: clients
  - name: placements
  - name: projects
  - name: activities
  - name: documents
  - name: financials
  - name: resources
  - name: sows
  - name: changeOrders
  - name: phases
  - name: forecasting
  - name: onboarding
  - name: integrations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Dashboard ──────────────────────────────────────────────────────────────
  /dashboard/summary:
